name: pupu
base: core22
version: '1.0.1'
title: Pupu
summary: Controller for Philips Hue lights on Linux
description: |
  Pupu es una aplicación para controlar las luces del sistema Philips Hue desde Linux.
  Conéctate a tu puente Hue y gestiona todas tus habitaciones desde una interfaz GTK sencilla.

  - Enciende y apaga habitaciones individualmente
  - Ajusta el brillo por habitación
  - Sincroniza las luces con la reproducción de música
  - Descubrimiento automático del puente en la red WiFi

grade: stable
confinement: strict
license: GPL-3.0

contact: https://github.com/mgatto98-netizen/hue-controller/issues
issues: https://github.com/mgatto98-netizen/hue-controller/issues
source-code: https://github.com/mgatto98-netizen/hue-controller
website: https://github.com/mgatto98-netizen/hue-controller

apps:
  pupu:
    command: bin/launcher
    extensions:
      - gnome
    environment:
      PYTHONPATH: $SNAP/usr/lib/python3/dist-packages:$SNAP/usr/lib/python3.10/dist-packages
      LD_LIBRARY_PATH: $SNAP/usr/lib/x86_64-linux-gnu:$SNAP/usr/lib:$LD_LIBRARY_PATH
      GTK_MODULES: ""
      GTK2_MODULES: ""
    plugs:
      - network
      - home
      - audio-playback

parts:
  pupu:
    plugin: python
    source: https://github.com/mgatto98-netizen/hue-controller.git
    source-branch: main
    python-packages:
      - requests
      - sounddevice
      - numpy
      - python-mbedtls
    build-packages:
      - libmbedtls-dev
      - python3-dev
      - libffi-dev
      - pkg-config
    stage-packages:
      - libmbedtls14
      - gir1.2-gtk-3.0
      - gir1.2-glib-2.0
      - python3-gi
      - python3-gi-cairo
    override-build: |
      craftctl default
      install -Dm755 sistema_hue.py "$CRAFT_PART_INSTALL/bin/pupu"
      install -Dm755 snap/local/launcher.sh "$CRAFT_PART_INSTALL/bin/launcher"
      install -Dm644 io.github.mgatto98.SistemaHue.png \
        "$CRAFT_PART_INSTALL/usr/share/icons/hicolor/256x256/apps/pupu.png"
      install -Dm644 io.github.mgatto98.SistemaHue.desktop \
        "$CRAFT_PART_INSTALL/usr/share/applications/io.github.mgatto98.SistemaHue.desktop"
      install -Dm644 io.github.mgatto98.SistemaHue.metainfo.xml \
        "$CRAFT_PART_INSTALL/usr/share/metainfo/io.github.mgatto98.SistemaHue.metainfo.xml"

  audio-libs:
    plugin: nil
    build-packages:
      - libportaudio2
      - pulseaudio-utils
    override-build: |
      mkdir -p "$CRAFT_PART_INSTALL/usr/lib/x86_64-linux-gnu"
      mkdir -p "$CRAFT_PART_INSTALL/usr/bin"
      cp -P /usr/lib/x86_64-linux-gnu/libportaudio.so.2* \
        "$CRAFT_PART_INSTALL/usr/lib/x86_64-linux-gnu/" 2>/dev/null || true
      cp /usr/bin/pactl "$CRAFT_PART_INSTALL/usr/bin/" 2>/dev/null || true
    prime:
      - usr/lib/x86_64-linux-gnu/libportaudio*
      - usr/bin/pactl
