app-id: io.github.pipio.SistemaHue
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: sistema-hue

finish-args:
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --socket=pulseaudio
  - --share=ipc

modules:

  # Librería de audio que necesita sounddevice
  - name: portaudio
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://github.com/PortAudio/portaudio/archive/refs/tags/v19.7.0.tar.gz
        sha256: 5af29ba58bbdbb7bbcefaaecc77ec8fc413f0db6f4c4e286c40c3e1b83174fa0

  # Dependencias Python (sin python-mbedtls, se instala aparte)
  - python3-deps.json

  # python-mbedtls: wheel manylinux ya incluye libmbedtls adentro, no requiere compilar
  - name: python3-python-mbedtls
    buildsystem: simple
    build-commands:
      - pip3 install --no-deps --prefix=/app python_mbedtls-2.10.1-cp311-cp311-manylinux_2_17_x86_64.manylinux2014_x86_64.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/cp311/p/python-mbedtls/python_mbedtls-2.10.1-cp311-cp311-manylinux_2_17_x86_64.manylinux2014_x86_64.whl
        sha256: 3f2316a1ba4909e35d378a2d7ab957bd67b98501f8f6c875160aeb76de306981

  # La aplicación
  - name: sistema-hue
    buildsystem: simple
    build-commands:
      - install -Dm755 sistema_hue.py /app/bin/sistema-hue
      - install -Dm644 io.github.pipio.SistemaHue.desktop
          /app/share/applications/io.github.pipio.SistemaHue.desktop
      - install -Dm644 io.github.pipio.SistemaHue.png
          /app/share/icons/hicolor/256x256/apps/io.github.pipio.SistemaHue.png
    sources:
      - type: git
        url: https://github.com/mgatto98/hue-controller.git
        branch: main
